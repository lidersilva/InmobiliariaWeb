<!DOCTYPE html>
<html>
<body>

    <table width="100%" border="0" cellspacing="0" cellpadding="0"
           style="border-collapse:collapse; font-family: Arial, sans-serif; font-size:11px;">

        <tr>
            <td width="35%" style="border:1px solid #000; padding:6px; font-weight:bold;">NRO OP:</td>
            <td width="35%" style="border:1px solid #000; padding:6px;">{{NRO_OP}}</td>
            <td width="30%"
                style="border-left:1px solid #000; border-right:1px solid #000; background-color:#FFC0CB; text-align:center; font-weight:bold; color:black;">
                LIBERADO POR CALIDAD
            </td>
        </tr>

        <tr>
            <td style="border:1px solid #000; padding:6px; font-weight:bold;">NRO CAJA:</td>
            <td style="border:1px solid #000; padding:6px;">{{NRO_CAJA}}</td>
            <td style="border-left:1px solid #000; border-right:1px solid #000;">&nbsp;</td>
        </tr>

        <tr>
            <td style="border:1px solid #000; padding:6px; font-weight:bold;">PRODUCTO:</td>
            <td style="border:1px solid #000; padding:6px;">{{PRODUCTO}}</td>
            <td style="border-left:1px solid #000; border-right:1px solid #000;">&nbsp;</td>
        </tr>

        <tr>
            <td style="border:1px solid #000; padding:6px; font-weight:bold;">CANTIDAD:</td>
            <td style="border:1px solid #000; padding:6px;">{{CANTIDAD}}</td>
            <td style="border-left:1px solid #000; border-right:1px solid #000;">&nbsp;</td>
        </tr>

        <tr>
            <td style="border:1px solid #000; padding:6px; font-weight:bold;">MÁQUINA:</td>
            <td style="border:1px solid #000; padding:6px;">{{MAQUINA}}</td>
            <td style="border-left:1px solid #000; border-right:1px solid #000;">&nbsp;</td>
        </tr>

        <tr>
            <td style="border:1px solid #000; padding:6px; font-weight:bold;">OPERADOR:</td>
            <td style="border:1px solid #000; padding:6px;">{{OPERADOR}}</td>
            <td style="border-left:1px solid #000; border-right:1px solid #000;">&nbsp;</td>
        </tr>

        <tr>
            <td style="border:1px solid #000; padding:6px; font-weight:bold;">FECHA:</td>
            <td style="border:1px solid #000; padding:6px;">{{FECHA}}</td>
            <td style="border-left:1px solid #000; border-right:1px solid #000;">&nbsp;</td>
        </tr>

        <tr>
            <td style="border:1px solid #000; padding:6px; font-weight:bold;">TURNO:</td>
            <td style="border:1px solid #000; padding:6px;">{{TURNO}}</td>
            <td style="border-left:1px solid #000; border-right:1px solid #000; border-bottom:1px solid #000;">&nbsp;</td>
        </tr>

        <!-- 🔵 FILA DEL CÓDIGO DE BARRAS -->
        <tr>
            <td colspan="3" style="border:1px solid #000; padding:6px; text-align:center;">
                {{BARCODE_IMAGE}}
            </td>
        </tr>

    </table>

</body>
</html>
