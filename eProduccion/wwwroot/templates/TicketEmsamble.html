<!DOCTYPE html>
<html>
<body>

    <table width="100%" border="0" cellspacing="0" cellpadding="0"
           style="border-collapse:collapse; font-family: Arial, sans-serif; font-size:11px;">

        <tr>
            <td colspan="2" style="border:1px solid #000; padding:6px; font-weight:bold; text-align:center; background:#f0f0f0;">
                ENSAMBLE
            </td>
            <td style="border:1px solid #000; padding:6px; font-weight:bold; text-align:center; background:#f0f0f0;">
                CONTROLADO
            </td>
        </tr>

        <tr>
            <td style="border:1px solid #000; padding:6px; width:50%;">
                <strong>OPERADOR:</strong>
            </td>
            <td style="border:1px solid #000; padding:6px; width:25%;">REMPLAZAR</td>
            <td style="border:1px solid #000; padding:6px; width:25%;">&nbsp;</td>
        </tr>

        <tr>
            <td style="border:1px solid #000; padding:6px;">
                <strong>FECHA RECEPCIÓN - SE:</strong>
            </td>
            <td style="border:1px solid #000; padding:6px;">REMPLAZAR</td>
            <td style="border:1px solid #000; padding:6px;">&nbsp;</td>
        </tr>

        <tr>
            <td style="border:1px solid #000; padding:6px;">
                <strong>HORA RECEPCIÓN - SE:</strong>
            </td>
            <td style="border:1px solid #000; padding:6px;">REMPLAZAR</td>
            <td style="border:1px solid #000; padding:6px;">&nbsp;</td>
        </tr>

        <tr>
            <td style="border:1px solid #000; padding:6px;">
                <strong>PRODUCTO:</strong>
            </td>
            <td style="border:1px solid #000; padding:6px;">REMPLAZAR</td>
            <td style="border:1px solid #000; padding:6px;">&nbsp;</td>
        </tr>

        <tr>
            <td style="border:1px solid #000; padding:6px;">
                <strong>FECHA FIN - ARMADO:</strong>
            </td>
            <td style="border:1px solid #000; padding:6px;">REMPLAZAR</td>
            <td style="border:1px solid #000; padding:6px;">&nbsp;</td>
        </tr>

        <tr>
            <td style="border:1px solid #000; padding:6px;">
                <strong>HORA FIN - ARMADO:</strong>
            </td>
            <td style="border:1px solid #000; padding:6px;">REMPLAZAR</td>
            <td style="border:1px solid #000; padding:6px;">&nbsp;</td>
        </tr>

        <tr>
            <td style="border:1px solid #000; padding:6px;">
                <strong>CANTIDAD ENTREGADA:</strong>
            </td>
            <td style="border:1px solid #000; padding:6px; border-bottom:1px solid #000;">REMPLAZAR</td>
            <td style="border:1px solid #000; padding:6px; border-bottom:1px solid #000;">&nbsp;</td>
        </tr>

        <!-- FILA DEL CÓDIGO DE BARRAS (ocupa las 3 columnas) -->
        <tr>
            <td colspan="3" style="border:1px solid #000; padding:6px; text-align:center;">
                {{BARCODE_IMAGE}}
            </td>
        </tr>

    </table>

</body>
</html>
