<!DOCTYPE html>
<html>
<body>

    <table width="100%" border="0" cellspacing="0" cellpadding="0"
           style="border-collapse:collapse; font-family: Arial, sans-serif; font-size:11px;">

        <tr>
            <td colspan="2" style="border:1px solid #000; padding:6px; font-weight:bold; text-align:center; background:#f0f0f0;">
                ENSAMBLE
            </td>
            <td style="border:1px solid #000; padding:6px; font-weight:bold; text-align:center; background:#f0f0f0;">
                CONTROLADO
            </td>
        </tr>

        <tr>
            <td style="border:1px solid #000; padding:6px; width:50%; font-weight:bold;">OPERADOR:</td>
            <td style="border:1px solid #000; padding:6px; width:25%;">{{OPERADOR}}</td>
            <td style="border:1px solid #000; padding:6px; width:25%;">&nbsp;</td>
        </tr>

        <tr>
            <td style="border:1px solid #000; padding:6px; font-weight:bold;">FECHA RECEPCIėN - SE:</td>
            <td style="border:1px solid #000; padding:6px;">{{FECHA_RECEPCION}}</td>
            <td style="border:1px solid #000; padding:6px;">&nbsp;</td>
        </tr>

        <tr>
            <td style="border:1px solid #000; padding:6px; font-weight:bold;">HORA RECEPCIėN - SE:</td>
            <td style="border:1px solid #000; padding:6px;">{{HORA_RECEPCION}}</td>
            <td style="border:1px solid #000; padding:6px;">&nbsp;</td>
        </tr>

        <tr>
            <td style="border:1px solid #000; padding:6px; font-weight:bold;">PRODUCTO:</td>
            <td style="border:1px solid #000; padding:6px;">{{PRODUCTO}}</td>
            <td style="border:1px solid #000; padding:6px;">&nbsp;</td>
        </tr>

        <tr>
            <td style="border:1px solid #000; padding:6px; font-weight:bold;">FECHA FIN - ARMADO:</td>
            <td style="border:1px solid #000; padding:6px;">{{FECHA_FIN}}</td>
            <td style="border:1px solid #000; padding:6px;">&nbsp;</td>
        </tr>

        <tr>
            <td style="border:1px solid #000; padding:6px; font-weight:bold;">HORA FIN - ARMADO:</td>
            <td style="border:1px solid #000; padding:6px;">{{HORA_FIN}}</td>
            <td style="border:1px solid #000; padding:6px;">&nbsp;</td>
        </tr>

        <tr>
            <td style="border:1px solid #000; padding:6px; font-weight:bold;">CANTIDAD ENTREGADA:</td>
            <td style="border:1px solid #000; padding:6px; border-bottom:1px solid #000;">{{CANTIDAD}}</td>
            <td style="border:1px solid #000; padding:6px; border-bottom:1px solid #000;">&nbsp;</td>
        </tr>

        <tr>
            <td colspan="3" style="border:1px solid #000; padding:6px; text-align:center;">
                {{BARCODE_IMAGE}}
            </td>
        </tr>

    </table>

</body>
</html>
